<!DOCTYPE html>
<html>
<head>
    <title>I2IT College</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f8ff;
        }

        .container {
            width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        img {
            display: block;
            margin: auto;
            width: 100px;
        }

        a {
            display: block;
            text-align: center;
            margin: 10px;
            color: blue;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: lightblue;
        }
    </style>
</head>

<body>

<div class="container">
    <!-- Logo -->
    <img src="logo.png" alt="I2IT Logo">

    <!-- Heading -->
    <h1>I2IT College</h1>

    <!-- Official Website Link -->
    <a href="https://www.isquareit.edu.in" target="_blank">
        Visit Official Website
    </a>

    <!-- Course Subject Table -->
    <table>
        <tr>
            <th>Course</th>
            <th>Subject</th>
        </tr>
        <tr>
            <td>First Year Engineering</td>
            <td>Mathematics</td>
        </tr>
        <tr>
            <td>First Year Engineering</td>
            <td>Physics</td>
        </tr>
        <tr>
            <td>First Year Engineering</td>
            <td>Chemistry</td>
        </tr>
        <tr>
            <td>Computer Engineering</td>
            <td>Data Structures</td>
        </tr>
        <tr>
            <td>Computer Engineering</td>
            <td>DBMS</td>
        </tr>
    </table>

</div>

</body>
</html>
