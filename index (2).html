<!DOCTYPE html>
<html>
<head>
    <title>Student Result Dashboard</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        table {
            width: 60%;
            margin: auto;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: lightblue;
        }
    </style>
</head>

<body>

<h1 style="text-align:center;">Student Result Dashboard</h1>

<h2 style="text-align:center;">Result Summary</h2>

<table>
    <tr>
        <th>Subject</th>
        <th>Marks</th>
        <th>Grade</th>
    </tr>

    <tr>
        <td>Mathematics</td>
        <td style="background-color: yellow;">95</td> <!-- Inline CSS (Top Scorer) -->
        <td>A+</td>
    </tr>

    <tr>
        <td>Physics</td>
        <td>88</td>
        <td>A</td>
    </tr>

    <tr>
        <td>Chemistry</td>
        <td>82</td>
        <td>A</td>
    </tr>

    <tr>
        <td>Computer</td>
        <td>90</td>
        <td>A+</td>
    </tr>
</table>

</body>
</html>
