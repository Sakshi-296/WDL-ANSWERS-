<!DOCTYPE html>
<html>
<head>
    <title>Food Fiesta</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #121212;
            color: #fff;
        }

        /* Navbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #1f1f1f;
        }

        header h1 {
            color: #ff9800;
        }

        header a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        header a:hover {
            color: #ff9800;
        }

        /* Slider */
        .slider {
            height: 250px;
            background: url('https://images.unsplash.com/photo-1514516870926-2068c2b9c62e') no-repeat center/cover;
            animation: slide 10s infinite;
        }

        @keyframes slide {
            0% {background-image: url('https://images.unsplash.com/photo-1514516870926-2068c2b9c62e');}
            50% {background-image: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');}
            100% {background-image: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5');}
        }

        /* Section */
        .section {
            padding: 30px;
            text-align: center;
        }

        /* Menu Grid */
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .item {
            background: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }

        .item:hover {
            transform: translateY(-5px);
        }

        .item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .item h3 {
            margin: 10px;
            color: #ff9800;
        }

        .item p {
            margin-bottom: 10px;
        }

        /* Drinks Grid */
        .drinks {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .drink-box {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }

        /* Footer */
        footer {
            background: #1f1f1f;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

        /* Responsive */
        @media(max-width:600px) {
            .drinks {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>

<body>

<!-- Header -->
<header>
    <h1>🍴 Food Fiesta</h1>
    <div>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Drinks</a>
        <a href="#">Contact</a>
    </div>
</header>

<!-- Slider -->
<div class="slider"></div>

<!-- Food Menu -->
<div class="section">
    <h2>🔥 Popular Dishes</h2>

    <div class="menu">
        <div class="item">
            <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
            <h3>Grilled Chicken</h3>
            <p>₹300</p>
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
            <h3>Cheese Pizza</h3>
            <p>₹250</p>
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
            <h3>Burger</h3>
            <p>₹150</p>
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
            <h3>Healthy Salad</h3>
            <p>₹180</p>
        </div>
    </div>
</div>

<!-- Drinks Section -->
<div class="section">
    <h2>🥤 Drinks</h2>

    <div class="drinks">
        <div class="drink-box">
            <span>Cold Coffee</span>
            <span>₹120</span>
        </div>

        <div class="drink-box">
            <span>Mojito</span>
            <span>₹140</span>
        </div>

        <div class="drink-box">
            <span>Fresh Juice</span>
            <span>₹100</span>
        </div>

        <div class="drink-box">
            <span>Milkshake</span>
            <span>₹130</span>
        </div>
    </div>
</div>

<!-- Footer -->
<footer>
    <p>© 2026 Food Fiesta | Designed with ❤️</p>
</footer>

</body>
</html>
