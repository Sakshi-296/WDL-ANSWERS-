<!DOCTYPE html>
<html>
<head>
    <title>Student Portfolio</title>
</head>
<body>

    <h2>Student Portfolio</h2>

    <!-- Name -->
    Name: <br>
    <input type="text"><br><br>

    <input type="radio" name="course"> Engineering<br>
    <input type="radio" name="course"> BSc<br>

    <!-- Submit -->
    <input type="submit" value="Submit">

</body>
</html>
