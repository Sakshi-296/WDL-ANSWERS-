<!DOCTYPE html>
<html>
<head>
    <title>Delicious Bites</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fff8f0;
        }

        /* Navbar */
        .navbar {
            background-color: #8b0000;
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* Hero Section */
        .hero {
            background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') no-repeat center;
            background-size: cover;
            height: 200px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
        }

        /* Menu Section */
        .menu {
            padding: 20px;
        }

        .menu h2 {
            text-align: center;
        }

        /* Grid Layout */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 5px gray;
        }

        .item img {
            width: 100%;
            height: 120px;
            border-radius: 10px;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        /* Gallery */
        .gallery {
            padding: 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .gallery img {
            width: 100%;
            height: 100px;
            border-radius: 10px;
        }

        /* Footer */
        .footer {
            background-color: #8b0000;
            color: white;
            text-align: center;
            padding: 10px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h1>Delicious Bites</h1>
    </div>

    <!-- Hero -->
    <div class="hero">
        Welcome to Our Restaurant
    </div>

    <!-- Menu -->
    <div class="menu">
        <h2>Our Menu</h2>

        <div class="menu-grid">

            <div class="item">
                <img src="https://images.unsplash.com/photo-1604908177522-4023c6c16a9a">
                <h3>Pizza</h3>
                <p class="price">₹250</p>
            </div>

            <div class="item">
                <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
                <h3>Burger</h3>
                <p class="price">₹150</p>
            </div>

            <div class="item">
                <img src="https://images.unsplash.com/photo-1589308078059-be1415eab4c3">
                <h3>Pasta</h3>
                <p class="price">₹200</p>
            </div>

            <div class="item">
                <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307">
                <h3>Cold Drink</h3>
                <p class="price">₹80</p>
            </div>

        </div>
    </div>

    <!-- Gallery -->
    <div class="gallery">
        <h2 style="text-align:center;">Gallery</h2>

        <div class="gallery-grid">
            <img src="https://images.unsplash.com/photo-1543353071-873f17a7a088">
            <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
            <img src="https://images.unsplash.com/photo-1601924928586-42f15b3b0f66">
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2026 Delicious Bites | All Rights Reserved</p>
    </div>

</body>
</html>
